name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web build

  api:
    name: API — lint, typecheck, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dsim
          POSTGRES_PASSWORD: dsim_dev
          POSTGRES_DB: dsim_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsim -d dsim_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    defaults:
      run:
        working-directory: ./apps/api
    env:
      DATABASE_URL: postgresql+asyncpg://dsim:dsim_dev@localhost:5432/dsim_test
      DATABASE_SYNC_URL: postgresql+psycopg://dsim:dsim_dev@localhost:5432/dsim_test
      REDIS_URL: redis://localhost:6379/0
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run alembic upgrade head
      - run: uv run pytest -v
